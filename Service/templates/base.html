<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Airport Service{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
      }
      .navbar {
        background-color: #002244;
      }
      .navbar-brand,
      .nav-link,
      .navbar-text {
        color: white !important;
      }
      .container {
        margin-top: 40px;
      }
      footer {
        margin-top: 60px;
        text-align: center;
        color: #777;
      }
    </style>
  </head>
  <body>
    <!-- Navigation bar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a
          class="navbar-brand"
          href="{% url 'service:service_home' %}"
          style="margin-right: 20px"
          >Airport Service</a
        >
        <div>
          <a
            class="nav-link d-inline"
            href="{% url 'service:special_assistance_list' %}"
            style="margin-right: 20px"
            >Assistance</a
          >
          <a
            class="nav-link d-inline"
            href="{% url 'service:book_flight' %}"
            style="margin-right: 20px"
            >Book Flight</a
          >
          <a
            class="nav-link d-inline"
            href="{% url 'service:manage_bookings' %}"
            style="margin-right: 20px"
            >My Bookings</a
          >
          <a
            class="nav-link d-inline"
            href="{% url 'service:flight_status' %}"
            style="margin-right: 20px"
            >Flight Status</a
          >
        </div>
      </div>
    </nav>

    <div class="container">
      {% if messages %} {% for message in messages %}
      <div class="alert alert-{{ message.tags }} mt-3">{{ message }}</div>
      {% endfor %} {% endif %}
      <!-- -- -->
      {% block content %}
      <!-- -- -->
      {% endblock %}
    </div>
  </body>
</html>
